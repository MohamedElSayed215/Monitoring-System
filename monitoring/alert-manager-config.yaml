apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: nodejs-alert-manager
  namespace: monitoring
spec:
  route:
    receiver: 'nodejs-slack'
    repeatInterval: 30m
    routes:
      - matchers:
          - name: alertname
            value: HighHttpRequests
        repeatInterval: 10m
  receivers:
    - name: 'nodejs-slack'
      slackConfigs:
        - apiURL:
            key: ###
            name: ###
          channel: '#k8s-alert'
          sendResolved: true
