apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nodejs-app-monitor
  namespace: monitoring
  labels:
    release: monitoring
    app: nodejs-app       
spec:
  jobLabel: job
  selector:
    matchLabels:
      app: nodejs-app         
  namespaceSelector:
    matchNames:
      - default                
  endpoints:
    - port: http               
      path: /metrics
      interval: 15s           
      scrapeTimeout: 10s
